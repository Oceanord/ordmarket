<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OrdMarket</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#050505;
  color:#fff;
  font-family:Inter;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 32px;
  border-bottom:1px solid #111;
  background:#050505;
  position:sticky;
  top:0;
}

.logo{
  font-family:'Bebas Neue';
  font-size:26px;
}
.logo span{color:#f7931a;}

.btc{
  font-size:13px;
  padding:6px 12px;
  background:#0f0f0f;
  border-radius:6px;
}

/* HERO */
.hero{
  padding:40px 32px;
}

h1{
  font-family:'Bebas Neue';
  font-size:48px;
  margin-bottom:10px;
}

.sub{
  color:#777;
}

/* TABLE */
.table{
  margin:20px 32px;
  border:1px solid #111;
  border-radius:10px;
  overflow:hidden;
}

.row{
  display:grid;
  grid-template-columns:40px 2fr 1fr 1fr 1fr;
  padding:14px;
  border-bottom:1px solid #0f0f0f;
  transition:all .2s ease;
}

.row:hover{
  background:#0c0c0c;
  transform:scale(1.01);
}

.head{
  background:#0a0a0a;
  color:#666;
  font-size:11px;
}

.green{color:#22c55e;}
.red{color:#ef4444;}

/* FLASH */
.flash-green{
  animation:flashGreen .4s;
}
.flash-red{
  animation:flashRed .4s;
}

@keyframes flashGreen{
  0%{background:rgba(34,197,94,0.2);}
  100%{background:transparent;}
}
@keyframes flashRed{
  0%{background:rgba(239,68,68,0.2);}
  100%{background:transparent;}
}

/* MINI CHART */
.chart{
  height:20px;
}

/* TICKER */
.ticker{
  overflow:hidden;
  border-top:1px solid #111;
  border-bottom:1px solid #111;
}

.ticker-track{
  display:flex;
  animation:scroll 25s linear infinite;
}

.ticker-item{
  padding:8px 20px;
  font-size:12px;
  color:#aaa;
}

@keyframes scroll{
  0%{transform:translateX(0);}
  100%{transform:translateX(-50%);}
}
</style>
</head>

<body>

<nav>
  <div class="logo">ORD<span>MARKET</span></div>
  <div class="btc">
    BTC: <span id="btc-price">$0</span>
    <span id="btc-change"></span>
  </div>
</nav>

<div class="hero">
  <h1>Bitcoin Ordinals Marketplace</h1>
  <div class="sub">Live trading experience</div>
</div>

<div class="ticker">
  <div class="ticker-track" id="ticker"></div>
</div>

<div class="table">

  <div class="row head">
    <div>#</div>
    <div>Collection</div>
    <div>Floor</div>
    <div>USD</div>
    <div>24h</div>
  </div>

  <div id="table"></div>

</div>

<script>

/* ================= STATE ================= */
let BTC = 0;

const collections = [
  {name:'NodeMonkes', floor:0.148, ch:-4.3},
  {name:'Bitcoin Frogs', floor:0.094, ch:9.7},
  {name:'TheUnion', floor:0.0071, ch:17.6},
  {name:'Voidlings', floor:0.0052, ch:22.1},
];

/* ================= BTC ================= */
function updateBTC(price, change){
  BTC = price;

  const p = document.getElementById('btc-price');
  const c = document.getElementById('btc-change');

  p.textContent = '$'+price.toLocaleString();
  p.style.color = change>=0?'#22c55e':'#ef4444';

  c.textContent = (change>=0?' ▲':' ▼')+Math.abs(change).toFixed(2)+'%';
  c.style.color = p.style.color;

  render();
}

async function fetchBTC(){
  try{
    const r = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT');
    const d = await r.json();

    updateBTC(parseFloat(d.lastPrice), parseFloat(d.priceChangePercent));
  }catch{}
}

/* ================= TABLE ================= */
function render(){
  const el = document.getElementById('table');

  el.innerHTML = collections.map((c,i)=>{
    const usd = Math.round(c.floor * BTC);

    return `
    <div class="row" id="row-${i}">
      <div>${i+1}</div>
      <div>${c.name}</div>
      <div>${c.floor.toFixed(4)} BTC</div>
      <div>$${usd.toLocaleString()}</div>
      <div class="${c.ch>=0?'green':'red'}">
        ${c.ch>=0?'+':''}${c.ch.toFixed(2)}%
      </div>
    </div>`;
  }).join('');

  buildTicker();
}

/* ================= MARKET SIM ================= */
function simulate(){
  collections.forEach((c,i)=>{
    const change = (Math.random()-0.5)*0.002;

    const old = c.floor;
    c.floor += change;
    if(c.floor<0.0001) c.floor=0.0001;

    c.ch = ((c.floor-old)/old)*100;

    const row = document.getElementById('row-'+i);
    if(row){
      row.classList.remove('flash-green','flash-red');
      row.classList.add(c.floor>old?'flash-green':'flash-red');
    }
  });

  render();
}

/* ================= TICKER ================= */
function buildTicker(){
  const t = document.getElementById('ticker');

  const html = collections.map(c=>{
    return `<div class="ticker-item">
      ${c.name} ${c.floor.toFixed(4)} BTC
    </div>`;
  }).join('');

  t.innerHTML = html + html;
}

/* ================= INIT ================= */
render();
fetchBTC();

setInterval(fetchBTC,10000);
setInterval(simulate,2000);

</script>

</body>
</html>
